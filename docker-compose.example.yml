services:
  verificaai-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verificaai-api
    env_file:
      - ./.env
    networks:
      - proxy
    ports:
      - "8001:8000"
    environment:
      TZ: ${APP_TZ}
      REDIS_URL: redis://verificaai-redis:6379/0
    volumes:
      - ./.env:/app/.env
      - ./db:/app/db
    depends_on:
      - verificaai-redis
    restart: unless-stopped

  verificaai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verificaai-worker
    env_file:
      - ./.env
    networks:
      - proxy
    environment:
      TZ: ${APP_TZ}
      REDIS_URL: redis://verificaai-redis:6379/0
    volumes:
      - ./.env:/app/.env
      - ./db:/app/db
    depends_on:
      - verificaai-redis
    command: ["/bin/sh", "-c", "exec uv run python src/worker.py"]
    restart: unless-stopped

  verificaai-final-result-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verificaai-final-result-worker
    env_file:
      - ./.env
    networks:
      - proxy
    environment:
      TZ: ${APP_TZ}
      REDIS_URL: redis://verificaai-redis:6379/0
    volumes:
      - ./.env:/app/.env
    depends_on:
      - verificaai-redis
    command: ["/bin/sh", "-c", "exec uv run python src/final_result_worker.py"]
    restart: unless-stopped

  verificaai-redis:
    image: redis:7
    container_name: verificaai-redis
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - verificaai_redis_data:/data

networks:
  proxy:
    external: true

volumes:
  verificaai_redis_data:
